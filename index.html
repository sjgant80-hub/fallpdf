<style>
:root{
  --void:#0b0a0f;--void-2:#13121a;--ink:#1a1922;--ink-2:#22212c;
  --line:#2a2934;--line-soft:#1f1e28;
  --cream:#e6e1d6;--cream-dim:#a8a395;--cream-muted:#6e6a5e;
  --brass:#b8974a;--amber:#ff8c00;--ox:#8b1a1a;
  --green:#4ade80;--red:#ef4444;--blue:#60a5fa;--yellow:#fbbf24;
  --paper:#fafaf6;--paper-edge:#dad6c8;
  --serif:Georgia,'Libre Baskerville',ui-serif,serif;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --mono:'IBM Plex Mono','SF Mono',ui-monospace,Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--void);color:var(--cream);font:13px/1.55 var(--sans);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow:hidden;height:100dvh}
button{font-family:inherit;cursor:pointer;background:transparent;border:none;color:inherit}
input,textarea,select{font-family:inherit;background:var(--ink);border:1px solid var(--line);color:var(--cream);border-radius:3px;padding:7px 10px;outline:none;font-size:12px}
input:focus,textarea:focus,select:focus{border-color:var(--brass)}
input[type=range]{padding:0;background:transparent;border:none;width:100%}
input[type=color]{width:40px;height:24px;padding:0;border:1px solid var(--line);cursor:pointer;background:var(--ink)}
a{color:var(--amber);text-decoration:none}
a:hover{text-decoration:underline}

.app{display:grid;grid-template-rows:42px 1fr;height:100dvh}
header{display:flex;align-items:center;border-bottom:1px solid var(--line);background:var(--void-2);user-select:none}
.brand{display:flex;align-items:center;gap:10px;padding:0 14px;height:100%;border-right:1px solid var(--line)}
.brand .mark{width:22px;height:22px;background:linear-gradient(135deg,var(--brass),var(--amber));border-radius:4px;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:13px;color:var(--void)}
.brand .name{font-family:var(--serif);font-weight:600;font-size:13px;letter-spacing:0.02em}
.brand .seal{font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:0.16em;text-transform:uppercase}

.menu{display:flex;flex:1;height:100%;align-items:stretch}
.menu button{padding:0 12px;font-size:12px;color:var(--cream-dim);height:100%;display:flex;align-items:center;gap:6px;letter-spacing:0.02em}
.menu button:hover{background:var(--ink);color:var(--cream)}
.menu button.divider{border-right:1px solid var(--line-soft);padding:0;width:1px;cursor:default}
.menu button:hover.divider{background:transparent}

.tools-r{display:flex;align-items:center;gap:5px;padding:0 12px;height:100%;border-left:1px solid var(--line)}
.tool-btn{padding:5px 10px;border-radius:3px;font-size:11px;color:var(--cream-dim);letter-spacing:0.06em;text-transform:uppercase;font-family:var(--mono);border:1px solid var(--line)}
.tool-btn:hover{background:var(--ink);color:var(--cream);border-color:var(--brass)}
.tool-btn.primary{background:var(--amber);color:var(--void);border-color:var(--amber);font-weight:600}
.tool-btn.primary:hover{background:var(--brass);border-color:var(--brass)}
.tool-btn.t3{border-color:var(--blue);color:var(--blue)}

.workspace{display:grid;grid-template-columns:1fr 1fr 280px;height:calc(100dvh - 42px);min-height:0}
@media(max-width:980px){.workspace{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr auto}.panels{grid-column:1/-1;max-height:240px}}
@media(max-width:680px){.workspace{grid-template-columns:1fr;grid-template-rows:auto auto auto}}

.editor-pane,.preview-pane,.panels{overflow:auto;display:flex;flex-direction:column;min-height:0}
.editor-pane{border-right:1px solid var(--line)}
.preview-pane{background:#1c1c24;border-right:1px solid var(--line)}
.panels{background:var(--void-2);border-left:1px solid var(--line)}

.pane-hd{padding:9px 14px;font-family:var(--mono);font-size:10px;color:var(--brass);letter-spacing:0.16em;text-transform:uppercase;background:var(--ink);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-bottom:1px solid var(--line)}
.pane-hd .tabs{display:flex;gap:0}
.pane-hd .tabs button{padding:3px 9px;font-size:10px;color:var(--cream-muted);letter-spacing:0.06em;border-radius:2px;font-family:var(--mono);text-transform:uppercase}
.pane-hd .tabs button.active{color:var(--amber);background:var(--void)}
.pane-hd .info{color:var(--cream-muted);font-size:10px}

#editor{flex:1;width:100%;background:var(--void);color:var(--cream);border:none;outline:none;padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.62;resize:none}
.preview-bd{flex:1;overflow:auto;padding:20px;display:flex;flex-direction:column;align-items:center;gap:14px}
.page{background:var(--paper);color:#222;box-shadow:0 6px 24px rgba(0,0,0,0.5),0 0 0 1px var(--paper-edge);position:relative;overflow:hidden}
.page-inner{position:absolute;left:0;top:0;width:100%;height:100%}
.page-num{position:absolute;bottom:6mm;left:0;right:0;text-align:center;font-family:Helvetica,Arial,sans-serif;font-size:9pt;color:#888}
.page-header{position:absolute;top:6mm;left:0;right:0;text-align:center;font-family:Helvetica,Arial,sans-serif;font-size:9pt;color:#888}
.preview-doc{padding:0}
.preview-doc h1{font-size:22pt;margin:0 0 10pt;font-weight:600}
.preview-doc h2{font-size:16pt;margin:14pt 0 8pt;font-weight:600}
.preview-doc h3{font-size:13pt;margin:12pt 0 6pt;font-weight:600;color:#5a4a2a}
.preview-doc p{margin:0 0 8pt;line-height:1.55}
.preview-doc ul,.preview-doc ol{margin:0 0 10pt 18pt}
.preview-doc li{margin-bottom:3pt}
.preview-doc blockquote{border-left:3px solid #b8974a;padding-left:10pt;margin:10pt 0;color:#555;font-style:italic}
.preview-doc code{background:#f0ecdf;padding:1pt 4pt;border-radius:2px;font-family:Courier,monospace;font-size:11pt}
.preview-doc pre{background:#f4f1e6;padding:10pt 12pt;border-left:3px solid #b8974a;font-family:Courier,monospace;font-size:10pt;overflow-x:auto;margin:8pt 0}
.preview-doc img{max-width:100%;display:block;margin:10pt auto}
.preview-doc hr{border:none;border-top:1px solid #d0c8b0;margin:14pt 0}
.preview-doc a{color:#b8974a}
.preview-doc table{border-collapse:collapse;margin:8pt 0;font-size:10pt}
.preview-doc th,.preview-doc td{border:1px solid #ccc;padding:4pt 8pt;text-align:left}
.preview-doc th{background:#ede7d5;font-weight:600}

.panel{border-bottom:1px solid var(--line)}
.panel-bd{padding:12px 14px}
.field{margin-bottom:10px}
.field label{display:block;font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px;display:flex;justify-content:space-between;align-items:baseline}
.field label .v{color:var(--brass)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}

.btn{padding:6px 11px;border:1px solid var(--brass);border-radius:3px;font-size:11px;color:var(--cream);background:transparent;letter-spacing:0.04em}
.btn:hover{border-color:var(--amber);color:var(--amber)}
.btn.primary{background:var(--amber);color:var(--void);border-color:var(--amber);font-weight:600}
.btn.primary:hover{background:var(--brass);border-color:var(--brass)}
.btn.full{width:100%}
.btn.sm{padding:4px 8px;font-size:10px}

/* PALETTE + MODAL */
.palette-bg,.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:flex-start;justify-content:center;padding-top:14vh;z-index:1000;backdrop-filter:blur(4px)}
.palette-bg.open,.modal-bg.open{display:flex}
.modal-bg{align-items:center;padding:18px}
.palette{background:var(--void-2);border:1px solid var(--brass);border-radius:6px;width:min(640px,90%);box-shadow:0 18px 50px rgba(0,0,0,0.7);overflow:hidden}
.palette-hd{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center}
.palette-hd .glyph{font-family:var(--serif);font-size:20px;color:var(--amber)}
.palette-hd input{flex:1;border:none;background:transparent;font-size:15px;padding:4px}
.palette-hd .badge{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase}
.palette-bd{max-height:50vh;overflow:auto;padding:8px}
.palette-row{padding:9px 12px;border-radius:3px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px}
.palette-row:hover,.palette-row.sel{background:var(--ink)}
.palette-row .ico{font-family:var(--serif);font-size:16px;color:var(--amber);width:22px;text-align:center}
.palette-row .desc{color:var(--cream-muted);font-size:11px;margin-top:2px}
.palette-row .key{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--cream-muted);background:var(--void);padding:2px 6px;border-radius:2px;letter-spacing:0.06em}
.modal{background:var(--void-2);border:1px solid var(--brass);border-radius:5px;padding:22px;max-width:540px;width:100%;max-height:90vh;overflow:auto}
.modal h2{font-family:var(--serif);font-size:17px;margin-bottom:14px}
.modal .actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--amber);color:var(--void);padding:9px 18px;border-radius:3px;font-family:var(--mono);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;font-weight:700;opacity:0;transition:all 0.22s;z-index:1100;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<script>
/*!
 * Fall Kit · v1.0.0 · the shared cascade for every estate seed
 * MIT · Simon Gant · ai-nativesolutions.com · ◊·κ=1
 *
 * Inlineable JS module. Drop into any seed via <script> or copy-paste inline.
 * Preserves single-HTML sovereignty (no external deps until user opts in to T2 WebLLM).

 * What it gives every seed:
 *  - AI tier picker: T0 (off · default) · T2 (WebLLM in-browser, 5 models 1B-70B) · T3 (BYOK Anthropic/OpenAI/Google)
 *  - Universal entry: FallKit.aiComplete(systemPrompt, userMsg, maxTokens) → string|null
 *  - AI chip UI in header
 *  - WebRTC P2P mesh (ported from canonical fallnet · fall-signal channel · Google STUN)
 *  - Help section partial: FallKit.helpSection()
 *  - Settings panel: FallKit.openSettings()
 *
 * Doctrine (per botler CLAUDE.md):
 *  - T0 fallback ALWAYS works · aiComplete returns null · caller MUST degrade gracefully
 *  - NEVER hide a feature behind AI · NEVER proxy API keys · NEVER log keys
 *  - WebLLM is lazy-loaded · model weights download ONLY on user opt-in
 *
 * Estate-first canonical references:
 *  - WebLLM pattern: Downloads/botler/index.html (T0/T2/T3 cascade)
 *  - WebRTC pattern: Downloads/fallnet/fallnet-shim.js (raw RTCPeerConnection)
 *  - Konomi seal:    ◊·κ=1  (consistent across all estate seeds)
 *  - Mesh channel:   'fall-signal'
 */
(function (root) {
  'use strict';

  const FALL_KIT_VERSION = '1.1.0';

  // ─── Model registry ──────────────────────────────────────────────
  const WEBLLM_MODELS = {
    'llama-1b':  { id: 'Llama-3.2-1B-Instruct-q4f16_1-MLC',   size: '~700MB', label: '1B · fast · any laptop / phone' },
    'llama-3b':  { id: 'Llama-3.2-3B-Instruct-q4f16_1-MLC',   size: '~2GB',   label: '3B · balanced · default · most laptops' },
    'qwen-7b':   { id: 'Qwen2.5-7B-Instruct-q4f16_1-MLC',     size: '~5GB',   label: '7B · capable · needs decent GPU (M-series Mac / 8GB+ VRAM)' },
    'llama-8b':  { id: 'Llama-3.1-8B-Instruct-q4f16_1-MLC',   size: '~5GB',   label: '8B · common · needs decent GPU' },
    'llama-70b': { id: 'Llama-3.1-70B-Instruct-q4f16_1-MLC',  size: '~40GB',  label: '70B · frontier · needs serious GPU + 64GB+ RAM' },
  };
  const DEFAULT_MODEL = 'llama-3b';

  const T3_PROVIDERS = {
    anthropic: { label: 'Anthropic Claude', models: ['claude-sonnet-4-5','claude-opus-4-7','claude-haiku-4-5'], default: 'claude-sonnet-4-5', url: 'https://api.anthropic.com/v1/messages' },
    openai:    { label: 'OpenAI',           models: ['gpt-4o','gpt-4o-mini','o1-mini'],                          default: 'gpt-4o-mini',      url: 'https://api.openai.com/v1/chat/completions' },
    google:    { label: 'Google Gemini',    models: ['gemini-1.5-pro','gemini-1.5-flash','gemini-2.0-flash-exp'], default: 'gemini-1.5-flash', url: 'https://generativelanguage.googleapis.com/v1beta/models/' },
  };

  // ─── State ───────────────────────────────────────────────────────
  const STATE = {
    config: loadConfig(),
    ai: { ready: false, loading: false, progress: 0, engine: null, model: null },
    mesh: { active: false, peers: new Map(), bc: null, signal: null },
  };

  function loadConfig() {
    try { return JSON.parse(localStorage.getItem('fall-kit.config') || '{}'); }
    catch (e) { return {}; }
  }
  function saveConfig() {
    try { localStorage.setItem('fall-kit.config', JSON.stringify(STATE.config)); } catch (e) {}
  }

  // ─── DOM helpers ─────────────────────────────────────────────────
  function $(s, root) { return (root || document).querySelector(s); }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

  // ─── AI tier ─────────────────────────────────────────────────────
  function aiTier() { return STATE.config.ai_tier || 'T0'; }

  function renderAiChip() {
    const chip = $('#fk-ai-chip');
    if (!chip) return;
    const txt = $('#fk-ai-chip-text');
    chip.classList.remove('fk-chip-live', 'fk-chip-loading', 'fk-chip-warn');
    const tier = aiTier();
    if (tier === 'T0') { txt.textContent = 'T0 · off'; }
    else if (tier === 'T2') {
      if (STATE.ai.ready) { txt.textContent = 'T2 ' + (WEBLLM_MODELS[STATE.config.webllm_model || DEFAULT_MODEL]?.label.split(' · ')[0] || '') + ' · ready'; chip.classList.add('fk-chip-live'); }
      else if (STATE.ai.loading) { txt.textContent = 'T2 loading ' + Math.round(STATE.ai.progress) + '%'; chip.classList.add('fk-chip-loading'); }
      else { txt.textContent = 'T2 · click to load'; chip.classList.add('fk-chip-warn'); }
    } else if (tier === 'T3') {
      if (STATE.config.api_key) { txt.textContent = 'T3 ' + (T3_PROVIDERS[STATE.config.api_provider]?.label || 'BYOK') + ' · active'; chip.classList.add('fk-chip-live'); }
      else { txt.textContent = 'T3 · no key set'; chip.classList.add('fk-chip-warn'); }
    }
  }

  async function loadWebLLM(modelKey) {
    if (STATE.ai.loading) return;
    const key = modelKey || STATE.config.webllm_model || DEFAULT_MODEL;
    const model = WEBLLM_MODELS[key];
    if (!model) { console.error('fall-kit: unknown model', key); return; }
    if (STATE.ai.ready && STATE.ai.model === model.id) return;
    STATE.ai.loading = true; STATE.ai.progress = 0; renderAiChip();
    notify('Loading WebLLM · ' + model.label + ' · ' + model.size + ' first time', 'info');
    try {
      const { CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm@0.2.79');
      const engine = await CreateMLCEngine(model.id, {
        initProgressCallback: p => { STATE.ai.progress = (p.progress || 0) * 100; renderAiChip(); }
      });
      STATE.ai.engine = engine;
      STATE.ai.model = model.id;
      STATE.ai.ready = true;
      STATE.ai.loading = false;
      STATE.config.webllm_model = key; saveConfig();
      renderAiChip();
      notify('WebLLM ready · sovereign mode · ' + model.label.split(' · ')[0], 'ok');
    } catch (e) {
      console.error('fall-kit: WebLLM load failed', e);
      STATE.ai.loading = false; renderAiChip();
      notify('WebLLM load failed · ' + e.message, 'err');
    }
  }

  async function aiComplete(systemPrompt, userMsg, maxTokens) {
    maxTokens = maxTokens || 600;
    const tier = aiTier();
    if (tier === 'T2' && STATE.ai.ready && STATE.ai.engine) {
      const r = await STATE.ai.engine.chat.completions.create({
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMsg }],
        max_tokens: maxTokens,
      });
      return r.choices[0].message.content;
    }
    if (tier === 'T3' && STATE.config.api_key && STATE.config.api_provider) {
      return await aiCloudCall(systemPrompt, userMsg, maxTokens);
    }
    return null;
  }

  async function aiCloudCall(sys, msg, maxTokens) {
    const provider = STATE.config.api_provider;
    const key = STATE.config.api_key;
    const model = STATE.config.api_model || T3_PROVIDERS[provider]?.default;
    if (provider === 'anthropic') {
      const r = await fetch(T3_PROVIDERS.anthropic.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({ model, max_tokens: maxTokens, system: sys, messages: [{ role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('Anthropic ' + r.status + ': ' + (await r.text()).slice(0, 200));
      const j = await r.json();
      return j.content[0].text;
    }
    if (provider === 'openai') {
      const r = await fetch(T3_PROVIDERS.openai.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({ model, max_tokens: maxTokens, messages: [{ role: 'system', content: sys }, { role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('OpenAI ' + r.status);
      const j = await r.json();
      return j.choices[0].message.content;
    }
    if (provider === 'google') {
      const r = await fetch(T3_PROVIDERS.google.url + model + ':generateContent?key=' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: sys + '\n\n---\n\n' + msg }] }], generationConfig: { maxOutputTokens: maxTokens } }),
      });
      if (!r.ok) throw new Error('Google ' + r.status);
      const j = await r.json();
      return j.candidates[0].content.parts[0].text;
    }
    throw new Error('unknown provider: ' + provider);
  }

  // ─── WebRTC P2P mesh (ported from canonical fallnet · fall-signal channel · Google STUN) ───
  const MESH_CHANNEL = 'fall-signal';
  const STUN_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }];
  function meshStart(opts) {
    if (STATE.mesh.active) return;
    opts = opts || {};
    const seedId = opts.seedId || (location.pathname + '#' + Math.random().toString(36).slice(2, 8));
    STATE.mesh.seedId = seedId;
    try { STATE.mesh.bc = new BroadcastChannel(MESH_CHANNEL); }
    catch (e) { console.warn('fall-kit: BroadcastChannel unavailable'); return; }
    STATE.mesh.bc.onmessage = e => {
      const m = e.data;
      if (!m || !m.kind || m.peerId === seedId) return;
      if (opts.onMessage) opts.onMessage(m);
    };
    STATE.mesh.bc.postMessage({ kind: 'fall-kit:hello', peerId: seedId, ts: Date.now(), seedName: opts.seedName || 'unknown' });
    STATE.mesh.active = true;
    notify('Mesh active · channel ' + MESH_CHANNEL, 'ok');
  }
  function meshPost(kind, payload) {
    if (!STATE.mesh.active || !STATE.mesh.bc) return false;
    STATE.mesh.bc.postMessage({ kind: kind, peerId: STATE.mesh.seedId, ts: Date.now(), payload: payload });
    return true;
  }

  // ─── Toast ───────────────────────────────────────────────────────
  function notify(msg, kind) {
    let t = $('#fk-toast');
    if (!t) {
      t = document.createElement('div'); t.id = 'fk-toast';
      t.style.cssText = 'position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);background:#c08a3a;color:#0a0a0a;padding:9px 18px;border-radius:3px;font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;opacity:0;transition:all .22s;z-index:10000;pointer-events:none';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.background = kind === 'err' ? '#a14a2a' : kind === 'ok' ? '#6b8d4a' : '#c08a3a';
    t.style.color = kind === 'err' ? '#fff' : '#0a0a0a';
    t.style.opacity = '1';
    t.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(t._to);

function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(STORE,1);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('s'))d.createObjectStore('s')};r.onsuccess=e=>{db=e.target.result;res(db)};r.onerror=rej})}
async function saveAll(){if(!db)await openDB();const tx=db.transaction('s','readwrite');tx.objectStore('s').put({mode:state.mode,source:state.source,settings:state.settings},'doc')}
async function loadAll(){if(!db)await openDB();return new Promise(r=>{const tx=db.transaction('s','readonly');const q=tx.objectStore('s').get('doc');q.onsuccess=()=>{if(q.result){state.mode=q.result.mode||'md';state.source=q.result.source||'';state.settings=Object.assign(state.settings,q.result.settings||{})}r()}})}

// MARKDOWN PARSER · returns a stream of typed blocks
// ════════════════════════════════════════════════════════════════
function parseMd(src){
  const lines=src.replace(/\r\n?/g,'\n').split('\n');
  const blocks=[];let i=0;
  while(i<lines.length){
    const ln=lines[i];
    if(/^\s*$/.test(ln)){i++;continue}
    if(/^---+$/.test(ln)){blocks.push({t:'hr'});i++;continue}
    if(/^#{1,3}\s/.test(ln)){const m=ln.match(/^(#{1,3})\s+(.+)$/);blocks.push({t:'h',n:m[1].length,text:m[2].trim()});i++;continue}
    if(/^>\s/.test(ln)){const buf=[];while(i<lines.length&&/^>\s/.test(lines[i])){buf.push(lines[i].replace(/^>\s/,''));i++}blocks.push({t:'quote',text:buf.join(' ')});continue}
    if(/^```/.test(ln)){i++;const buf=[];while(i<lines.length&&!/^```/.test(lines[i])){buf.push(lines[i]);i++}i++;blocks.push({t:'code',text:buf.join('\n')});continue}
    if(/^[-*]\s/.test(ln)){const items=[];while(i<lines.length&&/^[-*]\s/.test(lines[i])){items.push(lines[i].replace(/^[-*]\s+/,''));i++}blocks.push({t:'ul',items});continue}
    if(/^\d+\.\s/.test(ln)){const items=[];while(i<lines.length&&/^\d+\.\s/.test(lines[i])){items.push(lines[i].replace(/^\d+\.\s+/,''));i++}blocks.push({t:'ol',items});continue}
    if(/^!\[/.test(ln)){const m=ln.match(/^!\[([^\]]*)\]\(([^)]+)\)/);if(m){blocks.push({t:'img',alt:m[1],src:m[2]});i++;continue}}
    // paragraph: gather contiguous non-blank lines
    const buf=[];while(i<lines.length&&lines[i].trim()&&!/^(#{1,3}\s|>\s|```|[-*]\s|\d+\.\s|!\[|---+$)/.test(lines[i])){buf.push(lines[i]);i++}blocks.push({t:'p',text:buf.join(' ')});
  }
  return blocks;
}
// inline transform → preview HTML
function inlineHtml(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>')}
function inlinePlain(s){return s.replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*(.+?)\*/g,'$1').replace(/`([^`]+)`/g,'$1').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1')}
function mdToHtml(src){return parseMd(src).map(b=>{switch(b.t){case'h':return`<h${b.n}>${inlineHtml(b.text)}</h${b.n}>`;case'p':return`<p>${inlineHtml(b.text)}</p>`;case'quote':return`<blockquote>${inlineHtml(b.text)}</blockquote>`;case'code':return`<pre>${esc(b.text)}</pre>`;case'ul':return'<ul>'+b.items.map(i=>`<li>${inlineHtml(i)}</li>`).join('')+'</ul>';case'ol':return'<ol>'+b.items.map(i=>`<li>${inlineHtml(i)}</li>`).join('')+'</ol>';case'hr':return'<hr>';case'img':return`<img src="${esc(b.src)}" alt="${esc(b.alt)}">`}return''}).join('\n')}

// PDF WRITER — minimal inline PDF generator
// produces PDF/1.4 with text + images + multi-page
// ════════════════════════════════════════════════════════════════
function getPageDims(){
  const sz=$('#pgSize').value;
  const sizes={A4:[210,297],Letter:[216,279],Legal:[216,356],A3:[297,420],A5:[148,210],card:[90,55]};
  let [w,h]=sz==='custom'?[+$('#pgW').value||210,+$('#pgH').value||297]:sizes[sz];
  if($('#pgOri').value==='L'){[w,h]=[h,w]}
  return{w:w*MM_TO_PT,h:h*MM_TO_PT,wMm:w,hMm:h}
}
function getStyle(){
  return{
    font:$('#font').value,
    fs:+$('#fs').value,
    lh:+$('#lh').value,
    mt:+$('#pgMT').value*MM_TO_PT,
    mb:+$('#pgMB').value*MM_TO_PT,
    ml:+$('#pgML').value*MM_TO_PT,
    mr:+$('#pgMR').value*MM_TO_PT,
    hdr:$('#hdr').value,
    pgNum:$('#pgNum').checked,
    title:$('#docTitle').value||'untitled',
    author:$('#docAuthor').value||''
  }
}
// approximate Helvetica/Times/Courier glyph widths (avg) in em
const FONT_WIDTH={Helvetica:0.5,'Times-Roman':0.5,Courier:0.6};
function strWidth(s,fontKey,fs){return s.length*fs*(FONT_WIDTH[fontKey]||0.5)}
// PDF text escape
function pdfStr(s){return '('+String(s).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)').replace(/[\r\n]/g,' ')+')'}
// word-wrap a paragraph into lines fitting maxWidth (pt)
function wrap(text,fontKey,fs,maxW){const words=text.split(/\s+/),out=[];let cur='';for(const w of words){const t=cur?cur+' '+w:w;if(strWidth(t,fontKey,fs)<=maxW){cur=t}else{if(cur)out.push(cur);cur=w}}if(cur)out.push(cur);return out}

// extract images from blocks · return {key→{w,h,jpegBytes,dataLen}}
async function gatherImages(blocks){
  const map={};let n=0;
  for(const b of blocks){
    if(b.t==='img'&&b.src){
      const key='Im'+(++n);b.imgKey=key;
      try{
        const data=await loadImg(b.src);
        map[key]=data;
      }catch(e){console.warn('img failed',e)}
    }
  }
  return map;
}
function loadImg(src){return new Promise((res,rej)=>{const img=new Image();img.crossOrigin='anonymous';img.onload=()=>{const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(img,0,0);// JPEG bytes (smaller than PNG for big images)
const url=c.toDataURL('image/jpeg',0.85);const b64=url.split(',')[1];const bin=atob(b64);const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);res({w:c.width,h:c.height,bytes})};img.onerror=rej;img.src=src})}

async function buildPdf(){
  const pg=getPageDims();
  const st=getStyle();
  const blocks=state.mode==='md'?parseMd(state.source):state.mode==='html'?htmlToBlocks(state.source):textToBlocks(state.source);
  const images=await gatherImages(blocks);

  // layout into pages: walk blocks, position from top-left, page-break when needed
  const contentW=pg.w-st.ml-st.mr;
  const topY=pg.h-st.mt;     // pdf y is bottom-origin
  const bottomY=st.mb+(st.pgNum?14:0);
  const fontKey=st.font;
  const lineH=st.fs*st.lh;

  const pages=[];let ops=[];let y=topY;let pageN=1;
  function newPage(){pages.push(ops);ops=[];pageN++;y=topY}
  function ensureRoom(h){if(y-h<bottomY)newPage()}
  function drawTextLine(s,size,x,yy,bold){
    const f=fontKey==='Helvetica'?(bold?'F2':'F1'):fontKey==='Times-Roman'?(bold?'F4':'F3'):(bold?'F6':'F5');
    ops.push(`q BT /${f} ${size} Tf ${x.toFixed(2)} ${yy.toFixed(2)} Td ${pdfStr(s)} Tj ET Q`);
  }
  function drawRect(x,yy,w,h,fill){ops.push(`q ${fill} rg ${x.toFixed(2)} ${yy.toFixed(2)} ${w.toFixed(2)} ${h.toFixed(2)} re f Q`)}
  function drawHr(){ensureRoom(8);ops.push(`q 0.7 0.6 0.4 RG 1 w ${st.ml} ${(y-2).toFixed(2)} m ${(st.ml+contentW).toFixed(2)} ${(y-2).toFixed(2)} l S Q`);y-=8}

  for(const b of blocks){
    if(b.t==='h'){
      const size=b.n===1?20:b.n===2?15:13;
      const text=inlinePlain(b.text);
      const lines=wrap(text,fontKey,size,contentW);
      const totH=lines.length*size*1.2+8;
      ensureRoom(totH);
      y-=(b.n===1?14:10);
      for(const ln of lines){y-=size;drawTextLine(ln,size,st.ml,y,true)}
      y-=6;
    }else if(b.t==='p'){
      const text=inlinePlain(b.text);
      const lines=wrap(text,fontKey,st.fs,contentW);
      for(const ln of lines){ensureRoom(lineH);y-=lineH;drawTextLine(ln,st.fs,st.ml,y,false)}
      y-=lineH*0.4;
    }else if(b.t==='quote'){
      const text=inlinePlain(b.text);
      const lines=wrap(text,fontKey,st.fs,contentW-14);
      const startY=y;
      for(const ln of lines){ensureRoom(lineH);y-=lineH;drawTextLine(ln,st.fs,st.ml+14,y,false)}
      // bar
      ops.push(`q 0.72 0.59 0.29 RG 2 w ${(st.ml+2).toFixed(2)} ${y.toFixed(2)} m ${(st.ml+2).toFixed(2)} ${startY.toFixed(2)} l S Q`);
      y-=lineH*0.4;
    }else if(b.t==='code'){
      const lines=b.text.split('\n');
      const startY=y;
      const totH=lines.length*lineH+8;
      ensureRoom(totH);
      drawRect(st.ml,y-totH+4,contentW,totH,'0.96 0.94 0.86');
      for(const ln of lines){y-=lineH;drawTextLine(ln,st.fs-1,st.ml+8,y,false)}
      y-=lineH*0.6;
    }else if(b.t==='ul'||b.t==='ol'){
      let n=1;
      for(const it of b.items){
        const bullet=b.t==='ul'?'• ':(n+++'. ');
        const text=inlinePlain(it);
        const lines=wrap(text,fontKey,st.fs,contentW-16);
        for(let i=0;i<lines.length;i++){ensureRoom(lineH);y-=lineH;drawTextLine((i===0?bullet:'  ')+lines[i],st.fs,st.ml+8,y,false)}
      }
      y-=lineH*0.4;
    }else if(b.t==='hr'){drawHr()}
    else if(b.t==='img'&&b.imgKey&&images[b.imgKey]){
      const im=images[b.imgKey];
      const maxW=contentW;const scale=Math.min(1,maxW/im.w);
      const w=im.w*scale,h=im.h*scale;
      ensureRoom(h+10);
      y-=h;
      ops.push(`q ${w.toFixed(2)} 0 0 ${h.toFixed(2)} ${st.ml.toFixed(2)} ${y.toFixed(2)} cm /${b.imgKey} Do Q`);
      y-=10;
    }
  }
  pages.push(ops);
  return assemblePdf(pages,pg,st,images);
}

function assemblePdf(pages,pg,st,images){
  // page chrome (header/footer) inserted into each page content
  const decorate=(ops,i,total)=>{
    const opsOut=ops.slice();
    if(st.hdr){const w=strWidth(st.hdr,st.font,9);const f='F1';opsOut.unshift(`q BT /${f} 9 Tf ${((pg.w-w)/2).toFixed(2)} ${(pg.h-st.mt+8).toFixed(2)} Td 0.5 0.5 0.5 rg ${pdfStr(st.hdr)} Tj ET Q`)}
    if(st.pgNum){const lbl=`${i}/${total}`;const w=strWidth(lbl,'Helvetica',9);opsOut.push(`q BT /F1 9 Tf ${((pg.w-w)/2).toFixed(2)} ${(st.mb-10).toFixed(2)} Td 0.5 0.5 0.5 rg ${pdfStr(lbl)} Tj ET Q`)}
    return opsOut.join(' ');
  };

  // build object table
  const objs=[];const add=s=>{objs.push(s);return objs.length};
  // pre-allocate slot for catalog and info; we'll fill below
  // 1=Catalog 2=Pages 3=Info
  const obj1='<< /Type /Catalog /Pages 2 0 R >>';
  // build page objs first to know IDs, then patch Pages
  // font objects (6 fonts: F1 Helv, F2 Helv-Bold, F3 Times-Roman, F4 Times-Bold, F5 Courier, F6 Courier-Bold)
  // image objects · variable
  // contents per page · variable

  // We'll structure in order:
  // 1 catalog, 2 pages, 3 info, 4..9 fonts (6), 10..(10+nImg-1) images, then per-page contents alternating with page objs
  const fontObjs=[
    '<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>',
    '<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>',
    '<< /Type /Font /Subtype /Type1 /BaseFont /Times-Roman /Encoding /WinAnsiEncoding >>',
    '<< /Type /Font /Subtype /Type1 /BaseFont /Times-Bold /Encoding /WinAnsiEncoding >>',
    '<< /Type /Font /Subtype /Type1 /BaseFont /Courier /Encoding /WinAnsiEncoding >>',
    '<< /Type /Font /Subtype /Type1 /BaseFont /Courier-Bold /Encoding /WinAnsiEncoding >>'
  ];
  const imgKeys=Object.keys(images);
  const imgObjs=imgKeys.map(k=>{const im=images[k];return{header:`<< /Type /XObject /Subtype /Image /Width ${im.w} /Height ${im.h} /ColorSpace /DeviceRGB /BitsPerSample 8 /BitsPerComponent 8 /Filter /DCTDecode /Length ${im.bytes.length} >>`,stream:im.bytes}});
  // assign object numbers
  const N={catalog:1,pages:2,info:3};
  let next=4;
  const fontIds={};fontObjs.forEach((_,i)=>{fontIds['F'+(i+1)]=next++});
  const imgIds={};imgKeys.forEach((k,i)=>{imgIds[k]=next++});
  const pageIds=[],contentIds=[];
  pages.forEach(()=>{pageIds.push(next++);contentIds.push(next++)});

  // build serialization with binary stream support
  const enc=new TextEncoder();
  let bytes=[];const xref=[];
  function append(s){const b=enc.encode(s);bytes.push(b);return b.length}
  function appendBin(arr){bytes.push(arr);return arr.length}
  function position(){return bytes.reduce((s,b)=>s+b.length,0)}

  append('%PDF-1.4\n');append('%\xC2\xA5\xC2\xB1\xC3\xAB\n');

  function writeObj(id,body,stream){xref[id]=position();append(`${id} 0 obj\n${body}\n`);if(stream){append('stream\n');appendBin(stream);append('\nendstream\n')}append('endobj\n')}

  // catalog, pages, info
  writeObj(N.catalog,obj1);
  // pages kids ref string built after we know page ids
  const kidsStr=pageIds.map(id=>id+' 0 R').join(' ');
  writeObj(N.pages,`<< /Type /Pages /Count ${pages.length} /Kids [${kidsStr}] /MediaBox [0 0 ${pg.w.toFixed(2)} ${pg.h.toFixed(2)}] >>`);
  writeObj(N.info,`<< /Title ${pdfStr(st.title)} /Author ${pdfStr(st.author)} /Producer (FallPDF v${VERSION}) /CreationDate (D:${new Date().toISOString().replace(/[-:T.Z]/g,'').slice(0,14)}Z) >>`);

  fontObjs.forEach((body,i)=>writeObj(fontIds['F'+(i+1)],body));
  imgKeys.forEach((k,i)=>{const o=imgObjs[i];writeObj(imgIds[k],o.header,o.stream)});

  // resource dict (fonts + images) shared per-page
  const fontResource='<< '+Object.keys(fontIds).map(k=>`/${k} ${fontIds[k]} 0 R`).join(' ')+' >>';
  const imgResource=imgKeys.length?'<< '+imgKeys.map(k=>`/${k} ${imgIds[k]} 0 R`).join(' ')+' >>':'';

  pages.forEach((opsArr,i)=>{
    const stream=enc.encode(decorate(opsArr,i+1,pages.length));
    const contentBody=`<< /Length ${stream.length} >>`;
    writeObj(contentIds[i],contentBody,stream);
    const resources=`<< /Font ${fontResource}${imgResource?' /XObject '+imgResource:''} >>`;
    writeObj(pageIds[i],`<< /Type /Page /Parent ${N.pages} 0 R /Resources ${resources} /Contents ${contentIds[i]} 0 R >>`);
  });

  // xref
  const xrefPos=position();
  const total=next;
  let xrefStr='xref\n0 '+total+'\n0000000000 65535 f \n';
  for(let i=1;i<total;i++){xrefStr+=String(xref[i]||0).padStart(10,'0')+' 00000 n \n'}
  append(xrefStr);
  append(`trailer\n<< /Size ${total} /Root ${N.catalog} 0 R /Info ${N.info} 0 R >>\nstartxref\n${xrefPos}\n%%EOF\n`);

  // assemble
  const totalLen=bytes.reduce((s,b)=>s+b.length,0);
  const out=new Uint8Array(totalLen);let off=0;
  for(const b of bytes){out.set(b,off);off+=b.length}
  return out;
}

// html/text → blocks adapters
function htmlToBlocks(html){const div=document.createElement('div');div.innerHTML=html;const blocks=[];function walk(node){for(const c of node.childNodes){if(c.nodeType===1){const tag=c.tagName.toLowerCase();if(tag==='h1'||tag==='h2'||tag==='h3')blocks.push({t:'h',n:+tag[1],text:c.textContent.trim()});else if(tag==='p')blocks.push({t:'p',text:c.textContent.trim()});else if(tag==='blockquote')blocks.push({t:'quote',text:c.textContent.trim()});else if(tag==='pre')blocks.push({t:'code',text:c.textContent});else if(tag==='ul'){const items=Array.from(c.querySelectorAll('li')).map(li=>li.textContent.trim());if(items.length)blocks.push({t:'ul',items})}else if(tag==='ol'){const items=Array.from(c.querySelectorAll('li')).map(li=>li.textContent.trim());if(items.length)blocks.push({t:'ol',items})}else if(tag==='hr')blocks.push({t:'hr'});else if(tag==='img'){blocks.push({t:'img',alt:c.alt||'',src:c.src})}else if(tag==='div'||tag==='section'||tag==='article'||tag==='main'||tag==='body'){walk(c)}}}}walk(div);return blocks}
function textToBlocks(t){return t.split(/\n\s*\n/).filter(p=>p.trim()).map(p=>({t:'p',text:p.trim()}))}

// PREVIEW & UI
// ════════════════════════════════════════════════════════════════
function renderPreview(){
  const pg=getPageDims();
  const st=getStyle();
  state.source=$('#editor').value;
  const html=state.mode==='md'?mdToHtml(state.source):state.mode==='html'?state.source:textToBlocks(state.source).map(b=>`<p>${esc(b.text)}</p>`).join('');
  const scale=0.45;// preview scale
  const pageW=pg.wMm*3.78*scale;const pageH=pg.hMm*3.78*scale;
  const cssFont=st.font==='Times-Roman'?'Georgia,serif':st.font==='Courier'?'Courier,monospace':'Helvetica,Arial,sans-serif';
  // single-page preview (PDF export does proper pagination)
  $('#preview').innerHTML=`<div class="page" style="width:${pageW}px;height:${pageH}px"><div class="page-inner preview-doc" style="padding:${st.mt*scale/MM_TO_PT*3.78}px ${st.mr*scale/MM_TO_PT*3.78}px ${st.mb*scale/MM_TO_PT*3.78}px ${st.ml*scale/MM_TO_PT*3.78}px;font-family:${cssFont};font-size:${st.fs*scale*1.5}pt;line-height:${st.lh}">${html||'<p style="color:#aaa;font-style:italic">preview · type to see the page</p>'}</div>${st.hdr?`<div class="page-header" style="top:${st.mt*scale*0.35}px;font-size:${9*scale*1.5}pt">${esc(st.hdr)}</div>`:''}${st.pgNum?`<div class="page-num" style="bottom:${st.mb*scale*0.35}px;font-size:${9*scale*1.5}pt">1</div>`:''}</div><div style="font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.1em">preview · scaled · PDF export uses full resolution + proper pagination</div>`;
  const t=state.source;const words=(t.match(/\b[\w'-]+\b/g)||[]).length;$('#editInfo').textContent=`${t.length.toLocaleString()} chars · ${words.toLocaleString()} words`;$('#prevInfo').textContent=`${st.title} · ${pg.wMm}×${pg.hMm}mm`;
}

function setMode(m){state.mode=m;$$('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));renderPreview();saveAll()}
function onPgChange(){const c=$('#pgSize').value==='custom';$('#customDim').style.display=c?'grid':'none';renderPreview();saveAll()}

function newDoc(){if(state.source&&!confirm('discard current document?'))return;state.source='';$('#editor').value='';renderPreview();saveAll()}

$('#fileInput').addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;const text=await f.text();$('#editor').value=text;state.source=text;if(f.name.endsWith('.html'))setMode('html');else if(f.name.endsWith('.md'))setMode('md');else setMode('text');renderPreview();saveAll();toast('loaded '+f.name)});
function insertImage(){$('#imgInput').click()}
$('#imgInput').addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;const url=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(f)});const tag=`\n\n![${f.name}](${url})\n\n`;const ed=$('#editor');const p=ed.selectionStart;ed.value=ed.value.slice(0,p)+tag+ed.value.slice(p);state.source=ed.value;renderPreview();saveAll();toast('image inserted')});

async function exportPDF(){toast('building…');const bytes=await buildPdf();const blob=new Blob([bytes],{type:'application/pdf'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);const title=($('#docTitle').value||'fallpdf').replace(/[^\w-]/g,'-');a.download=`${title}-${Date.now()}.pdf`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);toast('PDF exported')}
function exportMarkdown(){const blob=new Blob([state.source],{type:'text/markdown'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=($('#docTitle').value||'fallpdf')+'-source.md';a.click()}

// ════════════════════════════════════════════════════════════════
// Ω AUTOPILOT
// ════════════════════════════════════════════════════════════════
const TEMPLATES={
  'letter':'**[Your name]**\n[Your address]\n[Date]\n\n**[Recipient name]**\n[Recipient address]\n\nDear [Name],\n\n[Body of letter — replace with the actual content.]\n\nYours sincerely,\n\n[Your name]',
  'memo':'# Memorandum\n\n**To:** [Recipient]\n**From:** [You]\n**Date:** '+new Date().toLocaleDateString('en-GB')+'\n**Re:** [Subject]\n\n---\n\n## Summary\n[Short summary]\n\n## Detail\n[Detail]\n\n## Action required\n[What you need from the recipient]',
  'invoice':'# Invoice\n\n**Invoice #:** INV-001\n**Date:** '+new Date().toLocaleDateString('en-GB')+'\n**Due:** [Date]\n\n**Bill to:**\n[Client name]\n[Client address]\n\n**From:**\n[Your name / company]\n[Your address]\n\n## Line items\n\n- Service 1 · £000\n- Service 2 · £000\n\n## Total\n\n**£0,000**\n\nPayment via bank transfer to [account].',
  'report':'# [Report title]\n\n**Prepared by:** [Author]\n**Date:** '+new Date().toLocaleDateString('en-GB')+'\n\n## Executive summary\n[One-paragraph summary]\n\n## Findings\n- Finding 1\n- Finding 2\n- Finding 3\n\n## Recommendation\n[Recommendation]\n\n## Appendix\n[Supporting detail]',
  'cv':'# [Your name]\n[email] · [phone] · [city]\n\n---\n\n## Profile\n[2-3 sentence summary]\n\n## Experience\n### [Most recent role] · [Company]\n*[Dates]*\n- Achievement\n- Achievement\n\n### [Previous role] · [Company]\n*[Dates]*\n- Achievement\n\n## Education\n### [Degree] · [Institution]\n*[Year]*\n\n## Skills\n[Skills, comma-separated]'
};
async function omegaRoute(intent){
  const q=intent.toLowerCase();
  for(const [k,v] of Object.entries(TEMPLATES)){if(q.includes(k)){$('#editor').value=v;state.source=v;setMode('md');$('#docTitle').value=k[0].toUpperCase()+k.slice(1);renderPreview();saveAll();toast('Ω · loaded '+k+' template');return}}
  if(/landscape/i.test(q)){$('#pgOri').value='L';onPgChange();toast('Ω · landscape');return}
  if(/portrait/i.test(q)){$('#pgOri').value='P';onPgChange();toast('Ω · portrait');return}
  if(/a4|letter|legal|a3|a5/i.test(q)){const m=q.match(/a4|letter|legal|a3|a5/i)[0];$('#pgSize').value=m.charAt(0).toUpperCase()+m.slice(1).toLowerCase();if(m.toLowerCase()==='a4')$('#pgSize').value='A4';if(m.toLowerCase()==='a3')$('#pgSize').value='A3';if(m.toLowerCase()==='a5')$('#pgSize').value='A5';onPgChange();toast('Ω · '+m);return}
  const tier=await Cascade.detectTier();
  if(tier!=='T0'){
    const sys='You are Ω, the orchestrator of FallPDF (a sovereign PDF writer). The user describes a document; you write it in markdown. Use # ## ### for headings, **bold**, *italic*, > for quotes, - for bullets, --- for horizontal rules. Be concise; one page unless the request explicitly asks for more. Return ONLY the markdown, no commentary, no code-fence wrapper.';
    try{const r=await Cascade.generate(sys,intent,1800);if(r.text){$('#editor').value=r.text.trim();state.source=$('#editor').value;setMode('md');$('#docTitle').value=intent.slice(0,50);renderPreview();saveAll();toast('Ω · drafted ('+r.tier+')');return}}catch(e){}
  }
  toast('Ω · try a template name (letter, memo, invoice, report, cv) or a size (A4, Letter, landscape)')
}

function openPalette(){$('#palette').classList.add('open');setTimeout(()=>$('#pInput').focus(),50);renderPaletteSuggestions('')}
function closePalette(){$('#palette').classList.remove('open');$('#pInput').value=''}
function renderPaletteSuggestions(q){
  const body=$('#pBody');
  if(!q.trim()){body.innerHTML=Object.keys(TEMPLATES).map(k=>`<div class="palette-row" onclick="omegaRoute('${k}');closePalette()"><div class="ico">▤</div><div><div>${k[0].toUpperCase()+k.slice(1)} template</div><div class="desc">load a starter for ${k}</div></div></div>`).join('')+`<div style="padding:10px 12px;font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase;border-top:1px dashed var(--line);margin-top:6px">or type · Ω will draft the markdown (T3 needed)</div>`;return}
  body.innerHTML=`<div class="palette-row sel" onclick="executeIntent()"><div class="ico">Ω</div><div><div>Ω · draft: ${esc(q.slice(0,80))}</div><div class="desc">enter · uses your model if a key is set</div></div><div class="key">↵</div></div>`
}
async function executeIntent(){const q=$('#pInput').value.trim();if(!q)return;closePalette();toast('Ω routing…');await omegaRoute(q)}

// ── modal ──

  if(kind==='settings'){
    $('#modalTitle').textContent='Settings · autopilot keys';
    $('#modalBody').innerHTML=`<p style="color:var(--cream-dim);font-size:12px;margin-bottom:10px"><a href="https://aistudio.google.com/apikey" target="_blank">Gemini is free</a>. Keys stay in this browser, sent direct to provider. Required only for Ω drafting (PDF generation works fully offline).</p>
      <div class="field"><label>anthropic · claude</label><input id="stAnth" type="password" value="${esc(state.settings.anthropicKey)}" placeholder="sk-ant-…"></div>
      <div class="field"><label>gemini · free</label><input id="stGem" type="password" value="${esc(state.settings.geminiKey)}"></div>
      <div class="field"><label>openai · gpt</label><input id="stOAI" type="password" value="${esc(state.settings.openaiKey)}"></div>

      <div class="actions"><button class="btn" onclick="closeModal()">cancel</button><button class="btn primary" onclick="saveSettingsModal()">save</button></div>`;
  }
  $('#modal').classList.add('open')
}
function closeModal(){$('#modal').classList.remove('open')}
function saveSettingsModal(){state.settings.anthropicKey=$('#stAnth').value;state.settings.geminiKey=$('#stGem').value;state.settings.openaiKey=$('#stOAI').value;state.settings.openrouterKey=$('#stOR').value;saveAll();updateTierBadge();closeModal();toast('saved')}

// ── keyboard ──
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openPalette();return}
  if((e.ctrlKey||e.metaKey)&&e.key==='e'){e.preventDefault();exportPDF();return}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();exportPDF();return}
  if(e.key==='Escape'){closePalette();closeModal()}
  if($('#palette').classList.contains('open')&&e.key==='Enter'){e.preventDefault();executeIntent()}
});
document.addEventListener('input',e=>{if(e.target.id==='pInput')renderPaletteSuggestions(e.target.value);if(e.target.id==='editor'){state.source=e.target.value;renderPreview();clearTimeout(window._sv);window._sv=setTimeout(saveAll,400)}});
document.addEventListener('click',e=>{if(e.target.id==='palette')closePalette();if(e.target.id==='modal')closeModal()});

// ── KONOMI · sovereign tier (inert) ──
window.KONOMI={active:true,tier:'sovereign',prime:PRIME,check:()=>({ok:true,tier:'sovereign'})};
// ── FALLMESH ──
try{const sig=new BroadcastChannel('fall-signal');sig.postMessage({source:'fallpdf',type:'hello',prime:PRIME,version:VERSION,ts:Date.now()});sig.addEventListener('message',e=>{const m=e.data;if(m&&m.type==='ping')sig.postMessage({source:'fallpdf',type:'pong',prime:PRIME})})}catch(e){}
// ── postMessage API ──
window.addEventListener('message',async e=>{const m=e.data;if(!m||m.target!=='fallpdf'||!m.action)return;let r=null;if(m.action==='ping')r={ok:true,prime:PRIME,version:VERSION};else if(m.action==='setSource'&&typeof m.source==='string'){$('#editor').value=m.source;state.source=m.source;renderPreview();r={ok:true}}else if(m.action==='exportPdf'){const bytes=await buildPdf();r={ok:true,bytes:Array.from(bytes)}}e.source?.postMessage({target:m.source||'*',responseTo:m.action,data:r},'*')});

// ── boot ──
(async function(){await openDB();await loadAll();await updateTierBadge();$('#editor').value=state.source;onPgChange();if(!state.source)loadSample();else renderPreview()})();
</script>
